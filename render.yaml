databases:
  - name: rent-flatmate-db
    plan: free
    region: singapore

services:
  - type: web
    name: rent-flatmate-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rent-flatmate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        fromService:
          type: web
          name: rent-flatmate-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-3-5-haiku-20241022
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "Rent & Flatmate Finder <no-reply@flatmatefinder.com>"
      - key: ADMIN_EMAIL
        value: admin@flatmatefinder.com
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: rent-flatmate-frontend
    runtime: static
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: rent-flatmate-backend
          envVarKey: RENDER_EXTERNAL_URL
